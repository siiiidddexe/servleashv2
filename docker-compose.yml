services:

  surrealdb:
    image: surrealdb/surrealdb:latest
    restart: always
    command: start --bind 0.0.0.0:8000 --user ${SURREALDB_USER:-root} --pass ${SURREALDB_PASS:-root} surrealkv:///data/db
    volumes:
      - surrealdb_data:/data/db
    healthcheck:
      test: ["CMD", "surreal", "is-ready", "--endpoint", "http://127.0.0.1:8000"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      - SURREALDB_URL=ws://surrealdb:8000
      - SURREALDB_USER=${SURREALDB_USER:-root}
      - SURREALDB_PASS=${SURREALDB_PASS:-root}
      - MAIL_API_URL=${MAIL_API_URL:-https://nexomail.logiclaunch.in}
      - MAIL_API_KEY=${MAIL_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - default
      - dokploy-network

volumes:
  surrealdb_data:
  uploads_data:

networks:
  dokploy-network:
    external: true
